name: Integration help
description: You're trying to install FileTag MCP in a client and something's not working.
title: "[help] Install in <client name>"
labels: ["help wanted", "integration"]
body:
  - type: markdown
    attributes:
      value: |
        We'll help you get unstuck. Before filing, make sure:

        - You have a valid API key (check at https://console.gemina.co)
        - You've fully **restarted** your MCP client (not just reloaded — restarted)
        - You've checked the [Troubleshooting](https://github.com/tommyil/gemina-mcp/blob/main/llms-install.md#8-troubleshooting) section

  - type: input
    id: client
    attributes:
      label: MCP client
      placeholder: "Claude Desktop / Cursor / VS Code / Cline / Codex / Windsurf / OpenClaw / Hermes / something else"
    validations:
      required: true

  - type: input
    id: client-version
    attributes:
      label: Client version
      placeholder: "e.g., Claude Desktop 0.7.4"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Your config (redact the API key)
      description: Paste the exact JSON/YAML/TOML you have in your client's config file.
      render: json
      placeholder: |
        {
          "mcpServers": {
            "gemina": {
              "url": "https://api.gemina.co/api/v1/mcp/",
              "headers": {
                "X-API-Key": "REDACTED"
              }
            }
          }
        }
    validations:
      required: true

  - type: textarea
    id: symptom
    attributes:
      label: What you see
      description: "Specifically: do the Gemina tools appear in your client? If yes, what happens when you invoke them?"
    validations:
      required: true

  - type: textarea
    id: smoke-test
    attributes:
      label: curl smoke-test result
      description: |
        Run the smoke-test from llms-install.md section 5. If it succeeds, the issue is client-side. If it fails, the issue is auth or network.
        Paste the response (redact any sensitive headers).
      render: shell

  - type: input
    id: os
    attributes:
      label: OS + version
      placeholder: "e.g., macOS 14.5"
